swagger: "2.0"
info:
  version: "1.0.0"
  title: "NEXORA API"
  description: "Unified API contract for frontend and backend."
host: localhost:8080
x-go-package: telephony
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json

paths:
  /webhook/twilio/voice/status:
    post:
      tags:
        - twilio
      summary: Twilio Voice status callback (webhook)
      description: Twilio StatusCallback for call-progress-events. Тело запроса — JSON (TwilioVoiceStatusCallbackForm).
      operationId: twilioVoiceStatusCallback
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/TwilioVoiceStatusCallbackForm"
      responses:
        200:
          description: OK
        400:
          description: Bad request

  /v1/auth/register:
    post:
      tags:
        - auth
      summary: Register a new company account
      description: Register a new company account with email/password credentials.
      operationId: authRegister
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: Successfully registered. No body; confirm email then login.
        400:
          description: Bad request (validation error)
          schema:
            $ref: "#/definitions/TransportError"
        409:
          description: Account already exists
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/auth/login:
    post:
      tags:
        - auth
      summary: Sign in with email and password
      operationId: authLogin
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: Login success
          schema:
            $ref: "#/definitions/LoginResponse"
        400:
          description: Bad request (validation error)
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Invalid credentials
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh access and refresh tokens
      description: Accepts refresh token in body. Returns new access and refresh tokens; backend also sets refresh token in httpOnly cookie.
      operationId: authRefresh
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RefreshRequest"
      responses:
        200:
          description: New tokens
          schema:
            $ref: "#/definitions/LoginResponse"
        401:
          description: Invalid or expired refresh token
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/auth/logout:
    post:
      tags:
        - auth
      summary: Log out and invalidate refresh token
      description: Accepts refresh token in body (or from cookie). Invalidates the token in Redis and clears the cookie. Idempotent when token is missing or already invalid.
      operationId: authLogout
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/RefreshRequest"
      responses:
        204:
          description: Logged out
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/auth/send-code:
    post:
      tags:
        - auth
      summary: Send verification code to email or phone
      operationId: authSendCode
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/SendCodeRequest"
      responses:
        204:
          description: Code sent
        400:
          description: Bad request (invalid email/phone or missing both)
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/auth/verify-link:
    get:
      tags:
        - auth
      summary: Verify link (transition by link from email/SMS)
      description: 6-значный токен (код) передаётся в query. Ссылка приходит в сообщении.
      operationId: authVerifyLinkGet
      parameters:
        - in: query
          name: token
          required: true
          type: string
          pattern: '^[0-9]{6}$'
        - in: query
          name: email
          required: true
          type: string
          format: email
      responses:
        204:
          description: Link verified
        400:
          description: Invalid, expired or too many attempts
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"
    post:
      tags:
        - auth
      summary: Verify link by token in body
      operationId: authVerifyLinkPost
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/VerifyLinkRequest"
      responses:
        204:
          description: Link verified
        400:
          description: Invalid, expired or too many attempts
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/profile:
    get:
      tags:
        - profile
      summary: Get current user profile
      operationId: profileGet
      responses:
        200:
          description: Profile data
          schema:
            $ref: "#/definitions/ProfileResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"
    patch:
      tags:
        - profile
      summary: Update profile (e.g. full name)
      operationId: profileUpdate
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/UpdateProfileRequest"
      responses:
        200:
          description: Updated profile
          schema:
            $ref: "#/definitions/ProfileResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/calls:
    post:
      tags:
        - calls
      summary: List company calls
      description: Returns paginated list of calls for the current company with optional filters. Body with more than one parameter.
      operationId: callsList
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/CallsListRequest"
      responses:
        200:
          description: List of calls with pagination meta
          schema:
            $ref: "#/definitions/CallsListResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/calls/{id}:
    get:
      tags:
        - calls
      summary: Get call tree by ID
      description: Returns full call tree with events and details for the given call ID (must belong to current company).
      operationId: callGetByID
      security:
        - Bearer: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: Call tree with events and details
          schema:
            $ref: "#/definitions/CallTreeResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        404:
          description: Call not found
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/metrics/calls:
    post:
      tags:
        - metrics
      summary: Get call metrics for period
      description: Returns aggregated call metrics and timeseries for the current company. date_from and date_to in body are required.
      operationId: metricsGetCallMetrics
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          schema:
            $ref: "#/definitions/CallMetricsRequest"
      responses:
        200:
          description: Call metrics summary and timeseries
          schema:
            $ref: "#/definitions/CallMetricsResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/company/telephony:
    get:
      tags:
        - company
      summary: List company telephony
      operationId: companyTelephonyList
      security:
        - Bearer: []
      responses:
        200:
          description: List of connected telephonies
          schema:
            $ref: "#/definitions/CompanyTelephonyListResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"
    post:
      tags:
        - company
      summary: Attach telephony to company
      operationId: companyTelephonyAttach
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CompanyTelephonyCreateRequest"
      responses:
        201:
          description: Created
          schema:
            $ref: "#/definitions/CompanyTelephonyItem"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        409:
          description: Conflict (already attached)
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/company/telephony/dictionary:
    get:
      tags:
        - company
      summary: List telephony dictionary
      operationId: companyTelephonyDictionary
      security:
        - Bearer: []
      responses:
        200:
          description: Available telephony providers
          schema:
            $ref: "#/definitions/TelephonyDictionaryResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/company/telephony/{id}:
    delete:
      tags:
        - company
      summary: Detach telephony from company
      operationId: companyTelephonyDetach
      security:
        - Bearer: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
          format: uuid
      responses:
        204:
          description: No content
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        404:
          description: Not found
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

  /v1/profile/avatar:
    post:
      tags:
        - profile
      summary: Upload avatar
      operationId: profileUploadAvatar
      consumes:
        - multipart/form-data
      parameters:
        - in: formData
          name: avatar
          type: file
          required: true
      responses:
        200:
          description: Profile with new avatar URL
          schema:
            $ref: "#/definitions/ProfileResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/TransportError"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/TransportError"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/TransportError"

definitions:
  RegisterRequest:
    type: object
    required:
      - companyName
      - password
    properties:
      companyName:
        type: string
        minLength: 1
      email:
        type: string
        format: email
        maxLength: 255
      phone:
        type: string
        maxLength: 20
      password:
        type: string
        minLength: 6
        format: password
      fullName:
        type: string
        maxLength: 255

  LoginRequest:
    type: object
    required:
      - login
      - password
    properties:
      login:
        type: string
        description: Email or phone number
      password:
        type: string
        minLength: 6
        format: password

  SendCodeRequest:
    type: object
    properties:
      email:
        type: string
        format: email
        maxLength: 255
      phone:
        type: string
        maxLength: 20
    description: At least one of email or phone is required

  VerifyLinkRequest:
    type: object
    required:
      - token
    properties:
      token:
        type: string
        pattern: '^[0-9]{6}$'
        description: 6-значный код из ссылки подтверждения или формы

  RefreshRequest:
    type: object
    required:
      - refreshToken
    properties:
      refreshToken:
        type: string

  LoginResponse:
    type: object
    required:
      - accessToken
      - refreshToken
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string

  TwilioVoiceStatusCallbackForm:
    type: object
    properties:
      CallSid:
        type: string
      ParentCallSid:
        type: string
      AccountSid:
        type: string
      From:
        type: string
      To:
        type: string
      CallStatus:
        type: string
      Direction:
        type: string
      ApiVersion:
        type: string
      CallerName:
        type: string
      ForwardedFrom:
        type: string
      CallbackSource:
        type: string
      SequenceNumber:
        type: string
      Timestamp:
        type: string
      CallDuration:
        type: string
      Duration:
        type: string
      SipResponseCode:
        type: string
      RecordingSid:
        type: string
      RecordingUrl:
        type: string
      RecordingDuration:
        type: string
      Called:
        type: string
      CalledCity:
        type: string
      CalledCountry:
        type: string
      CalledState:
        type: string
      CalledZip:
        type: string
      Caller:
        type: string
      CallerCity:
        type: string
      CallerCountry:
        type: string
      CallerState:
        type: string
      CallerZip:
        type: string
      FromCity:
        type: string
      FromCountry:
        type: string
      FromState:
        type: string
      FromZip:
        type: string
      ToCity:
        type: string
      ToCountry:
        type: string
      ToState:
        type: string
      ToZip:
        type: string

  ProfileResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      company_id:
        type: string
        format: uuid
      company_name:
        type: string
      role_id:
        type: integer
        format: int16
      email:
        type: string
        format: email
      phone:
        type: string
      full_name:
        type: string
      avatar_url:
        type: string
        description: Полная ссылка на аватар в хранилище
      avatar_id:
        type: string
        description: Идентификатор файла аватара в хранилище (UUID)
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  UpdateProfileRequest:
    type: object
    properties:
      full_name:
        type: string
        maxLength: 255

  TransportError:
    type: object
    required:
      - message
      - code
    properties:
      error:
        type: string
        example: "ServiceErrorUserAlreadyExists"
        description: "Error type identifier"
      message:
        type: string
        example: "validation error"
        description: "Human-readable error message"
      details:
        type: string
        description: "Additional error details (optional)"
      code:
        type: integer
        format: int32
        example: 400
        description: "HTTP status code (e.g., 400, 409, 500)"
      transaction_id:
        type: string
        format: uuid
        description: "Unique transaction ID for tracing"
    description: "Error response for API requests"

  PaginationParams:
    type: object
    required:
      - limit
      - offset
      - page
    description: Pagination parameters for list requests (page is 1-based, sent by client)
    properties:
      limit:
        type: integer
        format: int32
        description: Page size
      offset:
        type: integer
        format: int32
        description: Offset for pagination
      page:
        type: integer
        format: int32
        description: Current page (1-based)

  PaginationMeta:
    type: object
    required:
      - limit
      - offset
      - page
      - total
    description: Pagination meta in list responses; total is always set by backend
    properties:
      limit:
        type: integer
        format: int32
      offset:
        type: integer
        format: int32
      page:
        type: integer
        format: int32
        description: Current page (1-based)
      total:
        type: integer
        format: int32
        description: Total number of items

  CompanyTelephonyItem:
    type: object
    properties:
      id:
        type: string
        format: uuid
      telephony_name:
        type: string
      external_account_id:
        type: string
      created_at:
        type: string
        format: date-time

  CompanyTelephonyListResponse:
    type: object
    required:
      - items
    properties:
      items:
        type: array
        items:
          $ref: "#/definitions/CompanyTelephonyItem"

  CompanyTelephonyCreateRequest:
    type: object
    required:
      - telephony_name
      - external_account_id
    properties:
      telephony_name:
        type: string
      external_account_id:
        type: string

  TelephonyDictionaryItem:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string

  TelephonyDictionaryResponse:
    type: object
    required:
      - items
    properties:
      items:
        type: array
        items:
          $ref: "#/definitions/TelephonyDictionaryItem"

  CallMetricsRequest:
    type: object
    required:
      - date_from
      - date_to
    properties:
      date_from:
        type: string
        format: date
        description: Start date (YYYY-MM-DD).
      date_to:
        type: string
        format: date
        description: End date (YYYY-MM-DD).

  CallMetricsSummary:
    type: object
    properties:
      total:
        type: integer
        format: int32
      answered:
        type: integer
        format: int32
      missed:
        type: integer
        format: int32
      by_direction:
        type: object
        additionalProperties:
          type: integer
          format: int32

  CallMetricsPoint:
    type: object
    properties:
      date:
        type: string
        format: date
      total:
        type: integer
        format: int32
      answered:
        type: integer
        format: int32
      missed:
        type: integer
        format: int32

  CallMetricsResponse:
    type: object
    required:
      - summary
      - timeseries
    properties:
      summary:
        $ref: "#/definitions/CallMetricsSummary"
      timeseries:
        type: array
        items:
          $ref: "#/definitions/CallMetricsPoint"

  CallsListRequest:
    type: object
    required:
      - page
    properties:
      page:
        $ref: "#/definitions/PaginationParams"
      date_from:
        type: string
        format: date
        description: Filter from date (YYYY-MM-DD)
      date_to:
        type: string
        format: date
        description: Filter to date (YYYY-MM-DD)
      direction:
        type: string
        enum:
          - call_direction_inbound
          - call_direction_outbound_api
          - call_direction_outbound_dial
      status:
        type: string
        description: Last call event status filter
      company_telephony_id:
        type: string
        format: uuid

  CallsListItem:
    type: object
    properties:
      id:
        type: string
        format: uuid
      company_telephony_id:
        type: string
        format: uuid
      from_number:
        type: string
      to_number:
        type: string
      direction:
        type: string
        enum:
          - call_direction_inbound
          - call_direction_outbound_api
          - call_direction_outbound_dial
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      last_status:
        type: string
        description: Last call event status
      has_children:
        type: boolean
        description: True if the call has child calls (can be expanded)

  CallsListResponse:
    type: object
    required:
      - items
      - meta
    properties:
      items:
        type: array
        items:
          $ref: "#/definitions/CallsListItem"
      meta:
        $ref: "#/definitions/PaginationMeta"

  CallEventResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      status:
        type: string
      timestamp:
        type: string
        format: date-time

  CallDetailsResponse:
    type: object
    properties:
      recording_sid:
        type: string
      recording_url:
        type: string
      recording_duration:
        type: integer
        format: int32
      from_country:
        type: string
      from_city:
        type: string
      to_country:
        type: string
      to_city:
        type: string
      carrier:
        type: string
      trunk:
        type: string

  CallResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      company_telephony_id:
        type: string
        format: uuid
      parent_call_id:
        type: string
        format: uuid
      external_call_id:
        type: string
      external_parent_call_id:
        type: string
      from_number:
        type: string
      to_number:
        type: string
      direction:
        type: string
        enum:
          - call_direction_inbound
          - call_direction_outbound_api
          - call_direction_outbound_dial
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      events:
        type: array
        items:
          $ref: "#/definitions/CallEventResponse"
      details:
        $ref: "#/definitions/CallDetailsResponse"

  CallTreeResponse:
    type: object
    properties:
      call:
        $ref: "#/definitions/CallResponse"
      children:
        type: array
        items:
          $ref: "#/definitions/CallTreeResponse"
